<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Nuevo Producto - electronicadb</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { 
            background-color: #f4f6f9; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding-bottom: 60px; 
        }
        .top-navbar { 
            background-color: #ffffff; 
            border-bottom: 1px solid #e5e7eb; 
        }
        .brand-logo { 
            font-weight: 800; 
            font-size: 24px; 
            color: #dc3545; 
            text-decoration: none; 
            letter-spacing: -0.5px; 
        }
        .form-container { 
            background: #ffffff; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); 
            padding: 35px; 
            margin-top: 40px; 
            border: 1px solid #eaf0f6;
        }
    </style>
</head>
<body>

    <nav class="top-navbar py-3 sticky-top">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="/products/" class="brand-logo">electronicadb</a>
            <a href="/products/" class="btn btn-outline-secondary btn-sm px-3"><i class="bi bi-arrow-left me-1"></i> Volver al Catálogo</a>
        </div>
    </nav>

    <div class="container d-flex justify-content-center">
        <div class="col-md-8 form-container">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-dark mb-1">Registrar Nuevo Producto</h2>
                <p class="text-muted small">Ingrese la información técnica para añadir el artículo al inventario general.</p>
            </div>
            
            <form action="/products/create" method="POST" enctype="multipart/form-data">
                
                <div class="mb-3">
                    <label for="name" class="form-label fw-bold">Nombre del Producto <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="name" name="name" placeholder="Ej. Licuadora Oster 3 Velocidades" required>
                </div>

                <div class="mb-3">
                    <label for="category" class="form-label fw-bold">Categoría del Producto <span class="text-danger">*</span></label>
                    <select class="form-select" id="category" name="category" required>
                        <option value="" disabled selected>Seleccione una categoría...</option>
                        <option value="Electrodomésticos">Electrodomésticos</option>
                        <option value="Cómputo">Cómputo</option>
                        <option value="Celulares">Celulares</option>
                    </select>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="price" class="form-label fw-bold">Precio Público ($) <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" step="0.01" min="0" class="form-control" id="price" name="price" placeholder="0.00" required>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="stock" class="form-label fw-bold">Stock Inicial <span class="text-danger">*</span></label>
                        <input type="number" min="0" class="form-control" id="stock" name="stock" placeholder="Ej. 15" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label fw-bold">Descripción / Características</label>
                    <textarea class="form-control" id="description" name="description" rows="4" placeholder="Escriba aquí los detalles del producto, modelo, garantía, color, etc..."></textarea>
                </div>

                <div class="mb-4">
                    <label for="image_file" class="form-label fw-bold">Imagen del Producto</label>
                    <div class="input-group">
                        <input type="file" class="form-control" id="image_file" name="image_file" accept="image/*">
                        <span class="input-group-text bg-white text-muted"><i class="bi bi-image"></i></span>
                    </div>
                    <div class="form-text text-muted">Seleccione una fotografía clara del producto desde los archivos de su computador.</div>
                </div>

                <div class="row g-2 pt-3 border-top">
                    <div class="col-6">
                        <button type="submit" class="btn btn-danger w-100 py-2.5 fw-bold shadow-sm"><i class="bi bi-check-circle me-1"></i> Guardar en Base de Datos</button>
                    </div>
                    <div class="col-6">
                        <a href="/products/" class="btn btn-light border w-100 py-2.5 text-muted">Cancelar</a>
                    </div>
                </div>

            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
