<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido - electronicadb</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { 
            background-color: #f4f6f9; 
            font-family: 'Segoe UI', sans-serif; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .top-navbar { background-color: #ffffff; border-bottom: 1px solid #e5e7eb; }
        .brand-logo { font-weight: 800; font-size: 24px; color: #dc3545; text-decoration: none; }
        .welcome-card { background: #ffffff; border: 1px solid #eaf0f6; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); padding: 50px; text-align: center; }
        .icon-box { font-size: 60px; color: #dc3545; margin-bottom: 20px; }
        .btn-enter { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; font-weight: 700; padding: 14px 30px; border: none; border-radius: 8px; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>

    <nav class="top-navbar py-3">
        <div class="container">
            <a href="/" class="brand-logo">electronicadb</a>
        </div>
    </nav>

    <main class="container my-auto">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="welcome-card">
                    <div class="icon-box"><i class="bi bi-cpu-fill"></i></div>
                    <h1 class="fw-bold text-dark mb-3">Sistema de Gestión de Inventario</h1>
                    <p class="text-muted fs-5 mb-4">
                        Plataforma centralizada de administración para <strong>electronicadb</strong>.
                    </p>
                    <a href="/products/" class="btn-enter fs-5 shadow-sm">
                        <i class="bi bi-box-seam me-2"></i> Ingresar al Catálogo
                    </a>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-white text-center py-3 border-top text-muted">
        &copy; 2026 electronicadb - Panel de Control Interno.
    </footer>

</body>
</html>
