<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Producto - electronicadb</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; padding-bottom: 60px; }
        .brand-logo { font-weight: 800; font-size: 24px; color: #dc3545; text-decoration: none; }
        .form-container { background: #ffffff; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); padding: 30px; margin-top: 40px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom py-3">
        <div class="container">
            <a href="/products/" class="brand-logo">electronicadb</a>
            <a href="/products" class="btn btn-outline-secondary btn-sm">Cancelar</a>
        </div>
    </nav>

    <div class="container d-flex justify-content-center">
        <div class="col-md-8 form-container">
            <h2 class="text-center fw-bold mb-4" style="color: #1a202c;">Modificar Producto</h2>
            
            <form action="/products/{{ product._id }}/edit" method="POST" enctype="multipart/form-data">
                
                <div class="mb-3">
                    <label for="name" class="form-label fw-bold">Nombre del Producto</label>
                    <input type="text" class="form-control" id="name" name="name" value="{{ product.name }}" required>
                </div>

                <div class="mb-3">
                    <label for="category" class="form-label fw-bold">Categorías</label>
                    <select class="form-select" id="category" name="category">
                        <option value="Electrodomésticos" {% if product.category == 'Electrodomésticos' %}selected{% endif %}>Electrodomésticos</option>
                        <option value="Cómputo" {% if product.category == 'Cómputo' %}selected{% endif %}>Cómputo</option>
                        <option value="Celulares" {% if product.category == 'Celulares' %}selected{% endif %}>Celulares</option>
                    </select>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="price" class="form-label fw-bold">Precio ($)</label>
                        <input type="number" step="0.01" class="form-control" id="price" name="price" value="{{ product.price }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="stock" class="form-label fw-bold">Stock Disponible</label>
                        <input type="number" class="form-control" id="stock" name="stock" value="{{ product.stock }}" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label fw-bold">Descripción</label>
                    <textarea class="form-control" id="description" name="description" rows="3">{{ product.description }}</textarea>
                </div>

                <div class="mb-4">
                    <label for="image_file" class="form-label fw-bold">Actualizar Imagen del Producto</label>
                    {% if product.image_url %}
                        <div class="mb-2">
                            <span class="text-muted d-block small mb-1">Imagen actual cargada:</span>
                            <img src="{{ product.image_url }}" alt="Actual" style="max-height: 80px; border-radius: 5px;" class="border p-1">
                        </div>
                    {% endif %}
                    <input type="file" class="form-control" id="image_file" name="image_file" accept="image/*">
                    <div class="form-text text-muted">Deje este campo vacío si no desea cambiar la foto actual.</div>
                </div>

                <div class="row g-2">
                    <div class="col-6">
                        <button type="submit" class="btn btn-danger w-100 py-2 fw-bold">Guardar Cambios</button>
                    </div>
                    <div class="col-6">
                        <a href="/products" class="btn btn-light border w-100 py-2">Volver</a>
                    </div>
                </div>

            </form>
        </div>
    </div>

</body>
</html>
