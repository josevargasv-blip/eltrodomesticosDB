<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Producto Tecnológico</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #0f172a; color: #f8fafc; padding: 40px; margin: 0; }
        .container { max-width: 500px; background: #1e293b; padding: 30px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); margin: 0 auto; }
        h2 { color: #38bdf8; margin-top: 0; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; color: #94a3b8; }
        input, textarea, select { width: 100%; padding: 10px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: white; box-sizing: border-box; }
        input:focus, textarea:focus, select:focus { border-color: #38bdf8; outline: none; }
        textarea { resize: vertical; height: 80px; }
        button { width: 100%; background-color: #38bdf8; color: #0f172a; padding: 12px; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #0ea5e9; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Registrar Nuevo Producto</h2>
        <form action="/products/new" method="POST">
            <div class="form-group">
                <label for="name">Nombre del Producto:</label>
                <input type="text" id="name" name="name" required placeholder="Ej. Smart TV LG 55 pulgadas">
            </div>
            <div class="form-group">
                <label for="description">Descripción:</label>
                <textarea id="description" name="description" placeholder="Detalles de potencia, especificaciones, etc."></textarea>
            </div>
            <div class="form-group">
                <label for="price">Precio ($):</label>
                <input type="number" id="price" name="price" step="0.01" required placeholder="0.00">
            </div>
            <div class="form-group">
                <label for="stock">Stock Inicial:</label>
                <input type="number" id="stock" name="stock" required placeholder="0">
            </div>
            <div class="form-group">
                <label for="category">Categoría:</label>
                <select id="category" name="category">
                    <option value="Electrodomésticos">Electrodomésticos</option>
                    <option value="Cómputo">Cómputo</option>
                    <option value="Celulares">Celulares</option>
                    <option value="Audio y Video">Audio y Video</option>
                </select>
            </div>
            <div class="form-group">
                <label for="image_url">URL de la Imagen:</label>
                <input type="url" id="image_url" name="image_url" placeholder="https://ejemplo.com/imagen.jpg">
            </div>
            <button type="submit">Guardar en Inventario</button>
        </form>
    </div>
</body>
</html>
